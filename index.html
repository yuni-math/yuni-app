<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>קאפס 🥤 - Final Version</title>
    <style>
        :root {
            --purple: #9b59b6; --blue: #3498db; --green: #2ecc71;
            --orange: #e67e22; --yellow: #f1c40f; --red: #e74c3c;
            --bg: #1a1a2e;
        }
        body { 
            font-family: 'Assistant', sans-serif; background: var(--bg); 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 10px; color: white; 
        }
        .game-container { 
            width: 100%; max-width: 450px; text-align: center; position: relative; z-index: 10;
            display: flex; flex-direction: column; height: 95vh;
        }
        
        .levels { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; flex-shrink: 0; }
        .level-btn { background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 12px; cursor: pointer; flex: 1; }
        .level-btn.active { background: var(--blue); border-color: white; font-weight: bold; }

        .header { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; margin-bottom: 10px; flex-shrink: 0; }
        .stats { display: flex; justify-content: space-around; font-size: 1.3rem; font-weight: bold; }

        .cup {
            width: 42px; height: 58px;
            clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
            border-radius: 0 0 8px 8px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s; cursor: pointer;
        }
        .cup.empty { background: rgba(255,255,255,0.1); border: 1px dashed #666; }
        
        .selection-zone { display: flex; flex-direction: row; justify-content: center; gap: 8px; margin: 15px 0; min-height: 65px; flex-shrink: 0; }

        .palette {
            display: flex; justify-content: center; gap: 8px;
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; flex-shrink: 0;
        }
        .color-choice {
            width: 45px; height: 55px; border: none;
            clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
            cursor: pointer; transition: transform 0.1s;
        }

        .actions { margin: 15px 0; display: flex; gap: 8px; flex-shrink: 0; }
        .main-btn { padding: 14px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; flex: 1; font-size: 1rem; }
        .btn-check { background: var(--green); color: white; }
        .btn-hint { background: #f1c40f; color: black; }
        .btn-reset { background: #555; color: white; flex: 0.3; }

        .history-section {
            background: rgba(255,255,255,0.05); border-radius: 20px;
            padding: 10px; margin-top: 10px; 
            overflow-y: auto;
            flex-grow: 1;
            -webkit-overflow-scrolling: touch;
        }
        .history-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; align-items: center;}
        .mini-cups { display: flex; gap: 4px; }
        .tiny-cup { width: 14px; height: 20px; clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%); }
        
        .warming { background: #1b4d2e !important; }
        .win-flash { animation: red-flash-twice 0.6s ease-in-out 2; }
        @keyframes red-flash-twice { 0%, 100% { background: #1a1a2e; } 50% { background: #e74c3c; } }
        
        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 100; }

        .modal {
            display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8); align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: #2c3e50; padding: 25px; border-radius: 20px; text-align: center;
            width: 85%; max-width: 320px; border: 2px solid var(--blue); box-shadow: 0 0 20px var(--blue);
        }
        .modal-btn { margin-top: 15px; padding: 12px 25px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .modal-confirm { background: var(--green); color: white; margin-left: 10px; }
        .modal-cancel { background: #7f8c8d; color: white; }
    </style>
</head>
<body id="gameBody">

<canvas id="fireworks"></canvas>

<div id="customModal" class="modal">
    <div class="modal-content">
        <p id="modalText" style="font-size: 1.1rem; line-height: 1.5;"></p>
        <div id="modalButtons">
            <button class="modal-btn modal-confirm" id="confirmBtn">אישור</button>
            <button class="modal-btn modal-cancel" id="cancelBtn" onclick="closeModal()">ביטול</button>
        </div>
    </div>
</div>

<div class="game-container">
    <div class="levels">
        <button class="level-btn" id="lvl-easy" onclick="setDifficulty('easy')">קל</button>
        <button class="level-btn active" id="lvl-medium" onclick="setDifficulty('medium')">בינוני</button>
        <button class="level-btn" id="lvl-hard" onclick="setDifficulty('hard')">קשה</button>
    </div>

    <div class="header">
        <div class="stats">
            <span>ניסיונות: <span id="lives" style="color: #e74c3c;">12</span></span>
        </div>
    </div>

    <div id="message" style="font-size: 1.2rem; height: 35px; margin-bottom: 10px; font-weight: bold; color: #f1c40f;"></div>

    <div class="selection-zone" id="playerSelection"></div>

    <div class="palette" id="palette"></div>

    <div class="actions">
        <button class="main-btn btn-check" id="checkBtn" onclick="checkGuess()">▶️ בדוק</button>
        <button class="main-btn btn-hint" id="hintBtn" onclick="askForHint()">💡 רמז (-2)</button>
        <button class="main-btn btn-reset" onclick="initGame()">🔄</button>
    </div>

    <div class="history-section" id="history"></div>
</div>

<script>
    const allColors = ['--purple', '--blue', '--green', '--orange', '--yellow', '--red'];
    const colorNamesHeb = {'--purple':'סגול', '--blue':'תכלת', '--green':'ירוק', '--orange':'כתום', '--yellow':'צהוב', '--red':'אדום'};
    const numberToHeb = ['ראשונה', 'שנייה', 'שלישית', 'רביעית', 'חמישית', 'שישית'];
    
    let availableColors = [...allColors];
    let config = { size: 6, allowRepeats: false, level: 'medium' };
    let secretCombo = [], currentGuess = [], lives = 12, gameOver = false, lastHits = 0;
    let firstLoad = true;

    function showModal(text, onConfirm, showCancel = true) {
        const modal = document.getElementById('customModal');
        const confirmBtn = document.getElementById('confirmBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        document.getElementById('modalText').innerText = text;
        modal.style.display = 'flex';
        cancelBtn.style.display = showCancel ? 'inline-block' : 'none';
        confirmBtn.onclick = () => { modal.style.display = 'none'; if(onConfirm) onConfirm(); };
    }

    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    function setDifficulty(lvl) {
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('lvl-' + lvl).classList.add('active');
        config.level = lvl;
        if(lvl === 'easy') { config.size = 4; config.allowRepeats = false; }
        else if(lvl === 'medium') { config.size = 6; config.allowRepeats = false; }
        else { config.size = 6; config.allowRepeats = true; }
        initGame();
    }

    function initGame() {
        document.getElementById('gameBody').classList.remove('win-flash');
        document.getElementById('message').style.color = "#f1c40f"; 
        document.getElementById('checkBtn').disabled = false;
        document.getElementById('hintBtn').disabled = false;
        
        gameOver = false; lives = 12; currentGuess = []; lastHits = 0;
        
        availableColors = (config.level === 'easy') ? 
            [...allColors].sort(() => 0.5 - Math.random()).slice(0, 4) : [...allColors];

        if(config.allowRepeats) {
            secretCombo = Array.from({length: config.size}, () => availableColors[Math.floor(Math.random()*availableColors.length)]);
        } else {
            secretCombo = [...availableColors].sort(() => 0.5 - Math.random()).slice(0, config.size);
        }

        renderPalette();
        setupSlots();
        document.getElementById('history').innerHTML = '';
        document.getElementById('message').innerText = '';
        updateUI();
        
        if(firstLoad) {
            showModal("בחרו רמה והתחילו לשחק!", null, false);
            firstLoad = false;
        }
    }

    function renderPalette() {
        const p = document.getElementById('palette');
        p.innerHTML = '';
        availableColors.forEach(c => {
            let btn = document.createElement('button');
            btn.className = 'color-choice';
            btn.style.background = `var(${c})`;
            btn.onclick = () => addCup(c);
            p.appendChild(btn);
        });
    }

    function setupSlots() {
        const zone = document.getElementById('playerSelection');
        zone.innerHTML = '';
        for(let i=0; i<config.size; i++) {
            let d = document.createElement('div');
            d.className = 'cup empty';
            d.onclick = () => removeCup(i);
            zone.appendChild(d);
        }
    }

    function addCup(color) {
        if(gameOver || currentGuess.length >= config.size) return;
        if(!config.allowRepeats && currentGuess.includes(color)) return;
        currentGuess.push(color);
        updateUI();
    }

    function removeCup(i) { if(!gameOver) { currentGuess.splice(i, 1); updateUI(); } }

    function updateUI() {
        document.getElementById('lives').innerText = lives;
        const slots = document.querySelectorAll('.selection-zone .cup');
        slots.forEach((s, i) => {
            if(currentGuess[i]) { s.style.background = `var(${currentGuess[i]})`; s.classList.remove('empty'); }
            else { s.style.background = ''; s.classList.add('empty'); }
        });
    }

    function revealSolution() {
        const slots = document.querySelectorAll('.selection-zone .cup');
        slots.forEach((s, i) => {
            s.style.background = `var(${secretCombo[i]})`;
            s.classList.remove('empty');
            s.style.transition = 'background 0.5s ease-in-out';
        });
        // מנטרל כפתורים בסיום
        document.getElementById('checkBtn').disabled = true;
        document.getElementById('hintBtn').disabled = true;
    }

    function checkGuess() {
        if(currentGuess.length < config.size || gameOver) return;
        let hits = 0;
        let currentSnapshot = [...currentGuess]; 
        currentGuess.forEach((c, i) => { if(c === secretCombo[i]) hits++; });

        if(hits === config.size) {
            gameOver = true;
            document.getElementById('message').innerText = 'הצלחת!!! 🎉';
            document.getElementById('gameBody').classList.add('win-flash');
            startFireworks();
        } else {
            lives--;
            if(hits > lastHits && (12 - lives) > 1) {
                document.getElementById('gameBody').classList.add('warming');
                setTimeout(() => document.getElementById('gameBody').classList.remove('warming'), 500);
                document.getElementById('message').innerText = 'מתחמם! 🔥';
            } else { document.getElementById('message').innerText = `פגיעות: ${hits}`; }
            
            if(lives <= 0) { 
                lives = 0; 
                gameOver = true; 
                document.getElementById('message').style.color = "#e74c3c"; 
                document.getElementById('message').innerText = 'הפסדת... 💀 לא נורא, אולי בפעם הבאה... הסידור הנכון הוא:'; 
                
                // כאן השינוי:
                currentGuess = []; // מרוקנים את המערך כדי ש updateUI לא יציג את הניחוש הישן
                updateUI();        // מאפסים את התצוגה הוויזואלית
                revealSolution();  // מציגים את הפתרון במקום הניחושים
                
                saveHistory(hits, currentSnapshot); // שומרים את הניחוש האחרון בהיסטוריה בכל זאת
                lastHits = hits;
                return; // יוצאים מהפונקציה כדי שלא יתבצע האיפוס הרגיל בסוף
            }
        }
        saveHistory(hits, currentSnapshot);
        lastHits = hits;
        if(!gameOver) currentGuess = [];
        updateUI();
    }

    function askForHint() {
        if(gameOver || lives <= 2) { showModal("אין לך מספיק ניסיונות לרמז!", null, false); return; }
        showModal("רמז = 2 ניסיונות. האם ברצונך להשתמש ברמז?", useHint);
    }

    function useHint() {
        lives -= 2;
        let idx = Math.floor(Math.random() * config.size);
        let colorName = colorNamesHeb[secretCombo[idx]];
        let posFromRight = numberToHeb[idx];
        showModal(`רמז: כוס ${posFromRight} מימין היא בצבע ${colorName}!`, null, false);
        updateUI();
    }

    function saveHistory(hits, guessArray) {
        const row = document.createElement('div');
        row.className = 'history-row';
        let cups = '<div class="mini-cups">';
        guessArray.forEach(c => cups += `<div class="tiny-cup" style="background:var(${c})"></div>`);
        row.innerHTML = cups + `</div> <span>🎯 ${hits}</span>`;
        document.getElementById('history').prepend(row);
    }

    const canvas = document.getElementById('fireworks');
    const ctx = canvas.getContext('2d');
    function startFireworks() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<150; i++) { particles.push({ x: canvas.width/2, y: canvas.height/2, vx: Math.random()*14-7, vy: Math.random()*14-7, c: `hsl(${Math.random()*360}, 100%, 50%)`, r: Math.random()*4+2 }); }
        function animate() { if(!gameOver) { ctx.clearRect(0,0,canvas.width, canvas.height); return; } ctx.clearRect(0,0,canvas.width, canvas.height); particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.15; ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(animate); }
        animate();
    }

    initGame();
</script>
</body>
</html>
